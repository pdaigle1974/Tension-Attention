<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tension" />
  <title>Tension Attention</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="page-title">Tension Attention</h1>
    </header>
    <main id="app-content"></main>
    <nav id="bottom-nav">
      <button class="nav-btn" data-page="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </button>
      <button class="nav-btn" data-page="history">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Historique</span>
      </button>
      <button class="nav-btn" data-page="export">
        <span class="nav-icon">📤</span>
        <span class="nav-label">Exporter</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Paramètres</span>
      </button>
    </nav>
  </div>

  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
